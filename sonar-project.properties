# SonarQube Cloud configuration for SafeGuard+ API
sonar.projectKey=sambhavtandon_safeguard-ai-backend
sonar.organization=sambhavtandon
sonar.host.url=https://sonarcloud.io

# Source code location
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Exclude test files and dependencies (these are NOT code quality metrics)
sonar.exclusions=**/node_modules/**, **/tests/**, **/*.test.js, **/coverage/**, **/test-results/**

# JavaScript/Node.js specific
sonar.javascript.file.suffixes=.js

# Test coverage reports (from Jest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Quality gate - wait for results
sonar.qualitygate.wait=true
